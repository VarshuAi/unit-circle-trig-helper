<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Circle Trig Helper — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📐</span>
                <div class="title-col">
                    <h1>Unit Circle Trig Helper</h1>
                    <p class="tagline">Graph showing exact sin/cos offsets on standard unit circles.</p>
                </div>
            </div>
            <div class="badge">science</div>
        </header>

        <main class="workspace-card">
            
            <svg width="120" height="120" viewBox="0 0 100 100" style="display:block; margin:auto;">
                <circle cx="50" cy="50" r="40" fill="none" stroke="cyan" stroke-width="2" />
                <line x1="10" y1="50" x2="90" y2="50" stroke="gray" />
                <line x1="50" y1="10" x2="50" y2="90" stroke="gray" />
                <line x1="50" y1="50" x2="78" y2="21" stroke="orange" stroke-width="2" />
            </svg>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
